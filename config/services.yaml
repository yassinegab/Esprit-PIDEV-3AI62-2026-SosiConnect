# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

services:
    
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
    # makes classes in src/ available to be used as services
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Service\CyclePredictionService:
        arguments:
            $groqApiKey: '%env(GROQ_API_KEY)%'
    App\Service\SmsService:
        arguments:
            $sid: '%env(TWILIO_SID)%'
            $token: '%env(TWILIO_TOKEN)%'
            $from: '%env(TWILIO_FROM)%'

    App\Service\EventMailerService:
        arguments:
            $fromAddress: '%env(MAILER_FROM)%'

    App\Service\EventLoggerService:
        arguments:
            $sosiEventLogger: '@monolog.logger.sosi_event_log'

    App\Command\AppSendEventReminderCommand:
        arguments:
            $smsService: '@App\Service\SmsService'
            $verifiedNumber: '%env(TWILIO_VERIFIED_TO)%'
