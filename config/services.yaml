parameters:
    app.ors_api_key: '%env(OPENROUTESERVICE_API_KEY)%'
    meal_images_directory: "%kernel.project_dir%/public/uploads/meals"

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'